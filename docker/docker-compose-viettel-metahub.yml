# Docker Compose — Viettel MetaHub
# Dựa trên quickstart/docker-compose-without-neo4j.quickstart.yml với bổ sung
# service viettel-metahub-frontend (port 9000).
#
# Khởi chạy (từ thư mục docker/):
#   docker compose -f docker-compose-viettel-metahub.yml up -d
#
# Truy cập:
#   Viettel MetaHub UI      →  http://localhost:9000
#   DataHub GMS API         →  http://localhost:8080
#   Semantic Search Backend →  http://localhost:8001
---
services:

  # ─── Viettel MetaHub Frontend ────────────────────────────────────────────────
  viettel-metahub-frontend:
    hostname: viettel-metahub-frontend
    image: viettel-metahub-frontend:latest
    pull_policy: build
    build:
      context: ../viettel-metahub-frontend
      dockerfile: Dockerfile
      # No build-time env vars needed — all API calls use relative paths;
      # nginx routes them to datahub-frontend-react at runtime.
    ports:
      - ${VIETTEL_METAHUB_PORT:-9000}:80
    environment:
      - DATAHUB_FRONTEND_URL=http://datahub-frontend-react:9002
      - SEMANTIC_BACKEND_URL=http://viettel-metahub-backend:8000
    depends_on:
      datahub-frontend-react:
        condition: service_healthy
      viettel-metahub-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: wget -qO- http://localhost/health || exit 1
      start_period: 15s
      interval: 15s
      retries: 3
      timeout: 5s

  # ─── Qdrant (Vector DB for AI semantic search) ──────────────────────────────
  qdrant:
    hostname: qdrant
    image: qdrant/qdrant:v1.13.6
    ports:
      - ${QDRANT_PORT:-6333}:6333
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      start_period: 10s
      interval: 10s
      retries: 3
      timeout: 5s
    restart: unless-stopped

  # ─── Viettel MetaHub Backend (Vietnamese semantic search) ───────────────────
  viettel-metahub-backend:
    hostname: viettel-metahub-backend
    image: viettel-metahub-backend:latest
    pull_policy: build
    build:
      context: ../viettel-metahub-backend
      dockerfile: Dockerfile
    ports:
      - ${VIETTEL_BACKEND_PORT:-8001}:8000
    environment:
      - DATAHUB_GRAPHQL_URL=http://datahub-gms:8080/api/graphql
      - DATAHUB_GMS_URL=http://datahub-gms:8080
      - DATAHUB_TOKEN=${DATAHUB_TOKEN:-}
      - CORS_ORIGINS=http://localhost:${VIETTEL_METAHUB_PORT:-9000},http://viettel-metahub-frontend:80
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=datahub_entities
      - EMBEDDING_MODEL=intfloat/multilingual-e5-large
    volumes:
      - models_cache:/root/.cache/fastembed
    depends_on:
      datahub-frontend-react:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: python -c "import urllib.request, json; r=json.loads(urllib.request.urlopen('http://localhost:8000/health').read()); exit(0 if r.get('model_ready') else 1)"
      start_period: 120s
      interval: 10s
      retries: 6
      timeout: 10s

  # ─── DataHub Frontend (Play Framework — auth + API proxy) ────────────────────
  datahub-frontend-react:
    hostname: datahub-frontend-react
    image: ${DATAHUB_FRONTEND_IMAGE:-acryldata/datahub-frontend-react}:${DATAHUB_VERSION:-head}
    ports:
      - ${DATAHUB_MAPPED_FRONTEND_PORT:-9002}:9002
    environment:
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      - DATAHUB_SECRET=ViettelMetaHubPlaySecret2024XyZ9
      - DATAHUB_APP_VERSION=1.0
      - DATAHUB_PLAY_MEM_BUFFER_SIZE=10MB
      - JAVA_OPTS=-Xms512m -Xmx512m -Dhttp.port=9002 -Dconfig.file=datahub-frontend/conf/application.conf -Dlogback.configurationFile=datahub-frontend/conf/logback.xml -Dlogback.debug=false -Dpidfile.path=/dev/null
      - KAFKA_BOOTSTRAP_SERVER=broker:29092
      - DATAHUB_TRACKING_TOPIC=DataHubUsageEvent_v1
      - ELASTIC_CLIENT_HOST=elasticsearch
      - ELASTIC_CLIENT_PORT=9200
      - METADATA_SERVICE_AUTH_ENABLED=${METADATA_SERVICE_AUTH_ENABLED:-false}
    depends_on:
      datahub-gms:
        condition: service_healthy
    healthcheck:
      test: curl -sS --fail http://datahub-frontend-react:9002/health
      start_period: 90s
      interval: 1s
      retries: 3
      timeout: 5s
    restart: unless-stopped

  # ─── DataHub Actions ─────────────────────────────────────────────────────────
  datahub-actions:
    hostname: actions
    image: ${DATAHUB_ACTIONS_IMAGE:-acryldata/datahub-actions}:${DATAHUB_VERSION:-head}
    environment:
      - ACTIONS_CONFIG=${ACTIONS_CONFIG:-}
      - ACTIONS_EXTRA_PACKAGES=${ACTIONS_EXTRA_PACKAGES:-}
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      - DATAHUB_GMS_PROTOCOL=http
      - DATAHUB_SYSTEM_CLIENT_ID=__datahub_system
      - DATAHUB_SYSTEM_CLIENT_SECRET=JohnSnowKnowsNothing
      - KAFKA_BOOTSTRAP_SERVER=broker:29092
      - KAFKA_PROPERTIES_SECURITY_PROTOCOL=PLAINTEXT
      - METADATA_AUDIT_EVENT_NAME=MetadataAuditEvent_v4
      - METADATA_CHANGE_LOG_VERSIONED_TOPIC_NAME=MetadataChangeLog_Versioned_v1
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    depends_on:
      datahub-gms:
        condition: service_healthy
    restart: unless-stopped

  # ─── DataHub GMS (Backend API) ───────────────────────────────────────────────
  datahub-gms:
    hostname: datahub-gms
    image: ${DATAHUB_GMS_IMAGE:-acryldata/datahub-gms}:${DATAHUB_VERSION:-head}
    ports:
      - ${DATAHUB_MAPPED_GMS_PORT:-8080}:8080
    environment:
      - DATAHUB_SERVER_TYPE=${DATAHUB_SERVER_TYPE:-quickstart}
      - DATAHUB_TELEMETRY_ENABLED=${DATAHUB_TELEMETRY_ENABLED:-false}
      - DATAHUB_UPGRADE_HISTORY_KAFKA_CONSUMER_GROUP_ID=generic-duhe-consumer-job-client-gms
      - DATAHUB_TOKEN_SERVICE_SIGNING_KEY=ViettelMetaHubSigningKey2024abcdef0123456789abcdef0123456789abcdef
      - DATAHUB_TOKEN_SERVICE_SALT=ViettelSalt2024ab
      - EBEAN_DATASOURCE_DRIVER=com.mysql.jdbc.Driver
      - EBEAN_DATASOURCE_HOST=mysql:3306
      - EBEAN_DATASOURCE_URL=jdbc:mysql://mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8
      - EBEAN_DATASOURCE_USERNAME=datahub
      - EBEAN_DATASOURCE_PASSWORD=datahub
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX=true
      - ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX=true
      - ELASTICSEARCH_PORT=9200
      - ENTITY_REGISTRY_CONFIG_PATH=/datahub/datahub-gms/resources/entity-registry.yml
      - ENTITY_SERVICE_ENABLE_RETENTION=true
      - ES_BULK_REFRESH_POLICY=NONE
      - GRAPH_SERVICE_DIFF_MODE_ENABLED=true
      - GRAPH_SERVICE_IMPL=elasticsearch
      - JAVA_OPTS=-Xms1g -Xmx1g
      - KAFKA_BOOTSTRAP_SERVER=broker:29092
      - KAFKA_CONSUMER_STOP_ON_DESERIALIZATION_ERROR=${KAFKA_CONSUMER_STOP_ON_DESERIALIZATION_ERROR:-true}
      - KAFKA_SCHEMAREGISTRY_URL=http://schema-registry:8081
      - MAE_CONSUMER_ENABLED=true
      - MCE_CONSUMER_ENABLED=true
      - METADATA_SERVICE_AUTH_ENABLED=${METADATA_SERVICE_AUTH_ENABLED:-false}
      - PE_CONSUMER_ENABLED=true
      - THEME_V2_DEFAULT=true
      - UI_INGESTION_ENABLED=true
    healthcheck:
      test: curl -sS --fail http://datahub-gms:${DATAHUB_GMS_PORT:-8080}/health
      start_period: 90s
      interval: 1s
      retries: 3
      timeout: 5s
    depends_on:
      datahub-upgrade:
        condition: service_completed_successfully
    volumes:
      - datahub_plugins:/etc/datahub/plugins
    restart: unless-stopped

  # ─── DataHub Upgrade (init job) ──────────────────────────────────────────────
  datahub-upgrade:
    hostname: datahub-upgrade
    image: ${DATAHUB_UPGRADE_IMAGE:-acryldata/datahub-upgrade}:${DATAHUB_VERSION:-head}
    command:
      - -u
      - SystemUpdate
    environment:
      - DATAHUB_SQL_SETUP_ENABLED=true
      - EBEAN_DATASOURCE_USERNAME=datahub
      - EBEAN_DATASOURCE_PASSWORD=datahub
      - EBEAN_DATASOURCE_HOST=mysql:3306
      - EBEAN_DATASOURCE_URL=jdbc:mysql://mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8
      - EBEAN_DATASOURCE_DRIVER=com.mysql.jdbc.Driver
      - KAFKA_BOOTSTRAP_SERVER=broker:29092
      - KAFKA_SCHEMAREGISTRY_URL=http://schema-registry:8081
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX=true
      - ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX=true
      - ELASTICSEARCH_BUILD_INDICES_CLONE_INDICES=false
      - GRAPH_SERVICE_IMPL=elasticsearch
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      - METADATA_SERVICE_AUTH_ENABLED=${METADATA_SERVICE_AUTH_ENABLED:-false}
      - DATAHUB_TOKEN_SERVICE_SIGNING_KEY=ViettelMetaHubSigningKey2024abcdef0123456789abcdef0123456789abcdef
      - DATAHUB_TOKEN_SERVICE_SALT=ViettelSalt2024ab
      - DATAHUB_SYSTEM_CLIENT_ID=__datahub_system
      - DATAHUB_SYSTEM_CLIENT_SECRET=JohnSnowKnowsNothing
      - ENTITY_REGISTRY_CONFIG_PATH=/datahub/datahub-gms/resources/entity-registry.yml
      - BACKFILL_BROWSE_PATHS_V2=true
      - REPROCESS_DEFAULT_BROWSE_PATHS_V2=false
    labels:
      datahub_setup_job: true
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully

  # ─── MySQL ───────────────────────────────────────────────────────────────────
  mysql:
    hostname: mysql
    image: mysql:${DATAHUB_MYSQL_VERSION:-8.2}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin --default-authentication-plugin=mysql_native_password
    ports:
      - ${DATAHUB_MAPPED_MYSQL_PORT:-3306}:3306
    environment:
      - MYSQL_DATABASE=datahub
      - MYSQL_USER=datahub
      - MYSQL_PASSWORD=datahub
      - MYSQL_ROOT_PASSWORD=datahub
      - MYSQL_ROOT_HOST=%
    healthcheck:
      test: mysqladmin ping -h mysql -u $$MYSQL_USER --password=$$MYSQL_PASSWORD
      start_period: 20s
      interval: 1s
      retries: 5
      timeout: 5s
    volumes:
      - mysqldata:/var/lib/mysql
    restart: on-failure

  # ─── Kafka Setup (init job) ──────────────────────────────────────────────────
  kafka-setup:
    hostname: kafka-setup
    image: ${DATAHUB_KAFKA_SETUP_IMAGE:-acryldata/datahub-kafka-setup}:${DATAHUB_VERSION:-head}
    environment:
      - DATAHUB_PRECREATE_TOPICS=${DATAHUB_PRECREATE_TOPICS:-false}
      - KAFKA_BOOTSTRAP_SERVER=broker:29092
      - KAFKA_SCHEMAREGISTRY_URL=http://schema-registry:8081
    labels:
      datahub_setup_job: true
    depends_on:
      broker:
        condition: service_healthy
      schema-registry:
        condition: service_healthy

  # ─── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    hostname: elasticsearch
    image: ${DATAHUB_SEARCH_IMAGE:-elasticsearch}:${DATAHUB_SEARCH_TAG:-7.10.1}
    ports:
      - ${DATAHUB_MAPPED_ELASTIC_PORT:-9200}:9200
    environment:
      - discovery.type=single-node
      - ${XPACK_SECURITY_ENABLED:-xpack.security.enabled=false}
      - ES_JAVA_OPTS=-Xms256m -Xmx512m -Dlog4j2.formatMsgNoLookups=true
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: curl -sS --fail http://elasticsearch:$${DATAHUB_ELASTIC_PORT:-9200}/_cluster/health?wait_for_status=yellow&timeout=0s
      start_period: 20s
      interval: 1s
      retries: 3
      timeout: 5s
    volumes:
      - esdata:/usr/share/elasticsearch/data
    restart: unless-stopped

  # ─── Confluent Schema Registry ───────────────────────────────────────────────
  schema-registry:
    hostname: schema-registry
    image: ${DATAHUB_CONFLUENT_SCHEMA_REGISTRY_IMAGE:-confluentinc/cp-schema-registry}:${DATAHUB_CONFLUENT_VERSION:-7.9.2}
    ports:
      - ${DATAHUB_MAPPED_SCHEMA_REGISTRY_PORT:-8081}:8081
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schemaregistry
      - SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL=PLAINTEXT
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=broker:29092
    healthcheck:
      test: nc -z schema-registry ${DATAHUB_SCHEMA_REGISTRY_PORT:-8081}
      start_period: 60s
      interval: 1s
      retries: 3
      timeout: 5s
    depends_on:
      broker:
        condition: service_healthy
    restart: unless-stopped

  # ─── Apache Kafka Broker ─────────────────────────────────────────────────────
  broker:
    hostname: broker
    image: ${DATAHUB_CONFLUENT_KAFKA_IMAGE:-confluentinc/cp-kafka}:${DATAHUB_CONFLUENT_VERSION:-7.9.2}
    ports:
      - ${DATAHUB_MAPPED_KAFKA_BROKER_PORT:-9092}:9092
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_HEAP_OPTS=-Xms512m -Xmx512m
      - KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE=false
      - KAFKA_MESSAGE_MAX_BYTES=5242880
      - KAFKA_MAX_MESSAGE_BYTES=5242880
    healthcheck:
      test: nc -z broker $${DATAHUB_KAFKA_BROKER_PORT:-9092}
      start_period: 60s
      interval: 1s
      retries: 5
      timeout: 5s
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - broker:/var/lib/kafka/data/
    restart: unless-stopped

  # ─── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    hostname: zookeeper
    image: ${DATAHUB_CONFLUENT_ZOOKEEPER_IMAGE:-confluentinc/cp-zookeeper}:${DATAHUB_CONFLUENT_VERSION:-7.9.2}
    ports:
      - ${DATAHUB_MAPPED_ZK_PORT:-2181}:2181
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    healthcheck:
      test: echo srvr | nc zookeeper $${DATAHUB_ZK_PORT:-2181}
      start_period: 30s
      interval: 5s
      retries: 3
      timeout: 5s
    volumes:
      - zkdata:/var/lib/zookeeper/data
      - zklogs:/var/lib/zookeeper/log
    restart: unless-stopped

networks:
  default:
    name: viettel_metahub_network

volumes:
  esdata:
  broker:
  zkdata:
  zklogs:
  mysqldata:
  datahub_plugins:
  qdrant_data:
  models_cache:
